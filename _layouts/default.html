<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<header class="header">
  <div class="header-container">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </div>
</header>

<div class="container">

  <!-- MAIN CONTENT -->
  <main class="content">
    {{ content }}
  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="card">
      <h3>👤 About</h3>
      <p>Hung 😎 Dev Flutter + Spring Boot</p>
    </div>

    <div class="card">
      <h3>📂 Categories</h3>
      <ul>
        <li>Flutter</li>
        <li>Spring Boot</li>
        <li>Life</li>
      </ul>
    </div>

    <div class="card">
      <h3>🔥 Recent Posts</h3>
      <ul>
        {% for post in site.posts limit:5 %}
          <li><a href="{{ post.url }}">{{ post.title }}</a></li>
        {% endfor %}
      </ul>
    </div>
  </aside>

</div>

<footer class="footer">
  <p>© 2026 Petrus Hung 🚀</p>
</footer>

</body>
</html>
